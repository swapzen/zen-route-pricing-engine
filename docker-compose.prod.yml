services:
  pricing:
    build: .
    container_name: zen-pricing
    restart: unless-stopped
    env_file: .env.production
    environment:
      - RAILS_ENV=production
      - PORT=3002
      - RAILS_LOG_TO_STDOUT=1
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
      - NEW_RELIC_APP_NAME=SwapZen Pricing Engine
      - REDIS_URL=redis://swapzen-redis:6379/0
    ports:
      - "3002:3002"
    networks:
      - swapzen-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M

networks:
  swapzen-net:
    external: true
