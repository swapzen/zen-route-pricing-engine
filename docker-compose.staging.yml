services:
  pricing:
    build: .
    container_name: zen-pricing
    restart: unless-stopped
    env_file: .env.staging
    environment:
      - RAILS_ENV=staging
      - PORT=3002
    ports:
      - "3002:3002"
    networks:
      - swapzen-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  swapzen-net:
    external: true
